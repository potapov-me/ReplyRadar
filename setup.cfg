[importlinter]
root_packages =
    replyradar
include_external_packages = True

[importlinter:contract:processing-isolation]
name = Processing не импортирует usecases и api
type = forbidden
source_modules =
    replyradar.processing
forbidden_modules =
    replyradar.usecases
    replyradar.api

[importlinter:contract:knowledge-isolation]
name = Knowledge не импортирует api, processing и usecases
type = forbidden
source_modules =
    replyradar.knowledge
forbidden_modules =
    replyradar.api
    replyradar.processing
    replyradar.usecases

[importlinter:contract:routes-no-direct-repos]
name = Routes не обращаются к db.repos напрямую — только через usecases
type = forbidden
source_modules =
    replyradar.api.routes
forbidden_modules =
    replyradar.db.repos
# Транзитивный путь routes → usecases → repos разрешён (CQRS-lite query path)
allow_indirect_imports = True
