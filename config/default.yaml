# Модель активации сущностей (ADR-0009)
# Когда candidate → active автоматически
activation:
  min_mentions: 3    # минимум упоминаний в сообщениях
  min_chats: 2       # из как минимум N разных чатов

# Система уверенности фактов/связей (ADR-0007)
confidence:
  display_threshold: 0.75    # факт показывается без оговорок
  hedged_threshold: 0.40     # факт показывается с пометкой "вероятно"
  source_weights:
    self: 1.0        # человек говорит о себе сам
    other: 0.7       # другой человек говорит о нём
    inferred: 0.5    # выведено системой косвенно
  half_life_days: 365            # период полураспада уверенности (затухание по времени)
  max_corroboration_boost: 0.40  # максимальный бонус от независимых подтверждений
  corroboration_step: 0.10       # прирост уверенности за каждое подтверждение
  contradiction_penalty_factor: 0.5  # штраф за каждое противоречие

# Entity resolution (ADR-0006)
entity_resolution:
  similarity_threshold: 0.85  # порог cosine similarity для merge-кандидатов

# Processing pipeline (ADR-0011)
processing:
  backfill_batch_size: 20           # сообщений в одном батче backfill (embed/extract)
  classify_batch_size: 15           # сообщений в одном LLM-вызове batch-classify
  entity_extract_batch_size: 15     # сообщений в одном LLM-вызове EntityExtract
  max_retries_before_quarantine: 3  # попыток до перемещения в quarantine
  backfill_concurrency: 1           # параллельных воркеров backfill

# LLM через LM Studio (ADR-0004)
llm:
  base_url: http://host.docker.internal:1234/v1
  model: qwen/qwen3.5-9b
  api_key: lm-studio

# Embeddings через LM Studio
embedding:
  provider: lmstudio
  model: text-embedding-nomic-embed-text-v1.5-embedding
  base_url: http://host.docker.internal:1234/v1

# Подключение к Postgres — переопределяется через DATABASE__URL в .env
database:
  url: postgresql://postgres:postgres@localhost:5432/replyradar

# Telegram (Telethon MTProto) — получить api_id/api_hash на https://my.telegram.org
# Переопределяется через TELEGRAM__API_ID, TELEGRAM__API_HASH в .env
telegram:
  api_id: 0           # int, обязателен для подключения
  api_hash: ""        # str, обязателен для подключения
  session_name: replyradar            # имя файла сессии (без .session)
  session_dir: .      # директория для хранения .session файла

# Логирование (ADR-0019) — переопределяется через LOG__LEVEL, LOG__FORMAT в .env
log:
  level: INFO    # DEBUG | INFO | WARNING | ERROR
  format: text   # text | json  (json — для Docker / log-aggregation)

# Ручной импорт истории из Telegram Desktop Export (ADR-0017)
# Переопределяется через TG_IMPORT__MAX_FILE_SIZE_MB в .env
tg_import:
  max_file_size_mb: 200  # максимальный размер result.json в МБ
